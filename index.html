<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกรายรับ-รายจ่าย V.4</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MoneyTracker">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22บันทึกรายรับ-รายจ่าย%22,%22short_name%22:%22MoneyTracker%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f7f7f7%22,%22theme_color%22:%22%234e54c8%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/2489/2489756.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22https://cdn-icons-png.flaticon.com/512/2489/2489756.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4e54c8;
            --secondary-color: #8f94fb;
            --income-color: #2ecc71;
            --expense-color: #e74c3c;
            --bg-color: #f7f7f7;
            --card-bg: #ffffff;
            --text-gray: #777;
            --warning-color: #ff9800;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Prompt', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding-bottom: 50px;
        }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(78, 84, 200, 0.3);
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-card h1 { margin: 10px 0; font-size: 2.5em; }

        .inc-exp-container {
            background-color: var(--card-bg);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .inc-exp-container > div { flex: 1; text-align: center; }
        .inc-exp-container > div:first-of-type { border-right: 1px solid #dedede; }
        .money { font-size: 1.2em; font-weight: 600; }
        .money.plus { color: var(--income-color); }
        .money.minus { color: var(--expense-color); }

        /* Monthly Summary Card */
        .monthly-summary {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            text-align: center;
        }
        .monthly-summary h4 {
            margin: 0 0 5px 0;
            color: var(--text-gray);
            font-size: 0.9em;
        }
        .monthly-balance-value {
            font-size: 1.5em;
            font-weight: 600;
        }
        .monthly-balance-value.positive { color: var(--income-color); }
        .monthly-balance-value.negative { color: var(--expense-color); }
        .monthly-balance-value.zero { color: #333; }


        /* List & Date Headers */
        h3 { border-bottom: 1px solid #bbb; padding-bottom: 10px; margin-bottom: 15px; }

        .list { list-style-type: none; padding: 0; margin-bottom: 30px; }

        /* ส่วนหัววันที่ */
        .date-header {
            font-size: 0.9em;
            color: var(--text-gray);
            background-color: #e9ecef;
            padding: 5px 10px;
            border-radius: 5px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 600;
            display: inline-block;
        }

        .list li {
            background-color: var(--card-bg);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        
        .list li.plus { border-left: 5px solid var(--income-color); }
        .list li.minus { border-left: 5px solid var(--expense-color); }

        .item-details {
            display: flex;
            flex-direction: column;
        }
        
        .item-time {
            font-size: 0.75em;
            color: #aaa;
            margin-top: 3px;
        }

        .delete-btn {
            cursor: pointer;
            background-color: var(--expense-color);
            color: #fff;
            border: 0;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 5px;
            opacity: 0.2;
            transition: opacity 0.3s ease;
            margin-left: 10px;
        }

        .list li:hover .delete-btn { opacity: 1; }

        /* Form & Buttons */
        .form-control { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        
        input[type="text"], input[type="number"], input[type="datetime-local"] {
            border: 1px solid #dedede;
            border-radius: 8px;
            display: block;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            padding: 12px;
            width: 100%;
        }

        .btn {
            cursor: pointer;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            box-shadow: 0 4px 10px rgba(78, 84, 200, 0.3);
            color: #fff;
            border: 0;
            display: block;
            font-size: 18px;
            font-family: 'Prompt', sans-serif;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
            transition: transform 0.1s;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-group .btn-secondary {
            flex: 1;
            background: #ccc;
            color: #333;
            font-size: 14px;
            padding: 10px;
            border-radius: 8px;
            box-shadow: none;
            transition: background 0.2s;
        }
        
        .btn-group .btn-secondary.clear-all {
            background-color: var(--expense-color);
            color: white;
        }

        .btn-group .btn-secondary:hover {
            opacity: 0.9;
        }

        /* Switch Toggle */
        .switch-field { display: flex; margin-bottom: 15px; overflow: hidden; }
        .switch-field input { position: absolute !important; clip: rect(0, 0, 0, 0); height: 1px; width: 1px; border: 0; overflow: hidden; }
        .switch-field label {
            background-color: #e4e4e4;
            color: rgba(0, 0, 0, 0.6);
            font-size: 14px;
            line-height: 1;
            text-align: center;
            padding: 12px 16px;
            margin-right: -1px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            flex: 1;
            transition: all 0.1s ease-in-out;
        }
        .switch-field label:hover { cursor: pointer; }
        .switch-field input:checked + label { box-shadow: none; color: white; }
        .switch-field label:first-of-type { border-radius: 8px 0 0 8px; }
        .switch-field label:last-of-type { border-radius: 0 8px 8px 0; }
        #type-income:checked + label { background-color: var(--income-color); }
        #type-expense:checked + label { background-color: var(--expense-color); }
    </style>
</head>
<body>

    <div class="container">
        <div class="balance-card">
            <h4>ยอดเงินคงเหลือ **ทั้งหมด**</h4>
            <h1 id="balance">฿0.00</h1>
        </div>

        <div class="inc-exp-container">
            <div>
                <h4>รายรับรวม</h4>
                <p id="money-plus" class="money plus">+฿0.00</p>
            </div>
            <div>
                <h4>รายจ่ายรวม</h4>
                <p id="money-minus" class="money minus">-฿0.00</p>
            </div>
        </div>
        
        <div class="monthly-summary">
            <h4>ยอดคงเหลือ **ประจำเดือน** <span id="current-month-display"></span></h4>
            <p id="monthly-balance" class="monthly-balance-value zero">฿0.00</p>
        </div>
        <h3>เพิ่มรายการใหม่</h3>
        <form id="form">
            <div class="form-control">
                <label>ประเภท</label>
                <div class="switch-field">
                    <input type="radio" id="type-income" name="trans-type" value="income" checked/>
                    <label for="type-income">รายรับ (+)</label>
                    <input type="radio" id="type-expense" name="trans-type" value="expense" />
                    <label for="type-expense">รายจ่าย (-)</label>
                </div>
            </div>

            <div class="form-control">
                <label for="date">วันและเวลา</label>
                <input type="datetime-local" id="date" required />
            </div>

            <div class="form-control">
                <label for="text">ชื่อรายการ</label>
                <input type="text" id="text" placeholder="เช่น เงินเดือน, ค่าข้าว..." autocomplete="off" />
            </div>

            <div class="form-control">
                <label for="amount">จำนวนเงิน</label>
                <input type="number" id="amount" placeholder="0" step="0.01" />
            </div>

            <button class="btn">เพิ่มรายการ</button>
        </form>

        <div class="btn-group">
            <button class="btn-secondary" onclick="exportToCSV()"><i class="fas fa-file-export"></i> ดาวน์โหลด (.CSV)</button>
            <button class="btn-secondary clear-all" onclick="clearAllData()"><i class="fas fa-trash"></i> ล้างข้อมูลทั้งหมด</button>
        </div>

        <h3>ประวัติธุรกรรม</h3>
        <ul id="list" class="list">
        </ul>
    </div>

    <script>
        const balance = document.getElementById('balance');
        const money_plus = document.getElementById('money-plus');
        const money_minus = document.getElementById('money-minus');
        const list = document.getElementById('list');
        const form = document.getElementById('form');
        const text = document.getElementById('text');
        const amount = document.getElementById('amount');
        const dateInput = document.getElementById('date');
        const transTypes = document.getElementsByName('trans-type');
        
        const monthlyBalanceDisplay = document.getElementById('monthly-balance');
        const currentMonthDisplay = document.getElementById('current-month-display');

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        dateInput.value = now.toISOString().slice(0, 16);

        const localStorageTransactions = JSON.parse(localStorage.getItem('transactions'));
        let transactions = localStorage.getItem('transactions') !== null ? localStorageTransactions : [];

        transactions = transactions.map(t => {
            if(!t.date) t.date = new Date().toISOString();
            return t;
        });

        function addTransaction(e) {
            e.preventDefault();

            if (text.value.trim() === '' || amount.value.trim() === '') {
                alert('กรุณากรอกข้อมูลให้ครบ');
                return;
            }

            let type = 'income';
            for(let r of transTypes) if(r.checked) type = r.value;

            let amountValue = +amount.value;
            if (type === 'expense') amountValue = -Math.abs(amountValue);
            else amountValue = Math.abs(amountValue);

            const transaction = {
                id: generateID(),
                text: text.value,
                amount: amountValue,
                date: dateInput.value
            };

            transactions.push(transaction);
            updateLocalStorage();
            init();

            text.value = '';
            amount.value = '';
            const current = new Date();
            current.setMinutes(current.getMinutes() - current.getTimezoneOffset());
            dateInput.value = current.toISOString().slice(0, 16);
        }

        function generateID() { return Math.floor(Math.random() * 100000000); }

        function formatCurrency(value) {
            return parseFloat(value).toLocaleString('th-TH', {minimumFractionDigits: 2});
        }

        function updateValues() {
            const amounts = transactions.map(transaction => transaction.amount);

            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            const income = amounts.filter(item => item > 0).reduce((acc, item) => (acc += item), 0).toFixed(2);
            const expense = (amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1).toFixed(2);

            balance.innerText = `฿${formatCurrency(total)}`;
            money_plus.innerText = `+฿${formatCurrency(income)}`;
            money_minus.innerText = `-฿${formatCurrency(expense)}`;
            
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();

            const monthlyAmounts = transactions
                .filter(t => {
                    const tDate = new Date(t.date);
                    return tDate.getMonth() === currentMonth && tDate.getFullYear() === currentYear;
                })
                .map(t => t.amount);

            const monthlyTotal = monthlyAmounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            
            monthlyBalanceDisplay.innerText = `฿${formatCurrency(monthlyTotal)}`;
            currentMonthDisplay.innerText = today.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
            
            monthlyBalanceDisplay.className = 'monthly-balance-value';
            if (monthlyTotal > 0) {
                monthlyBalanceDisplay.classList.add('positive');
            } else if (monthlyTotal < 0) {
                monthlyBalanceDisplay.classList.add('negative');
            } else {
                monthlyBalanceDisplay.classList.add('zero');
            }
        }

        function removeTransaction(id) {
            const transaction = transactions.find(t => t.id === id);
            if (!transaction) return;

            const confirmMessage = `คุณแน่ใจหรือไม่ที่จะลบรายการ:\n"${transaction.text}" (฿${Math.abs(transaction.amount).toLocaleString('th-TH', {minimumFractionDigits: 2})})?`;
            const confirmDelete = confirm(confirmMessage);
            
            if (confirmDelete) {
                transactions = transactions.filter(t => t.id !== id);
                updateLocalStorage();
                init();
            }
        }
        
        function clearAllData() {
            const confirmClear = confirm("⚠️ คำเตือน: คุณต้องการลบประวัติธุรกรรมทั้งหมดหรือไม่? การดำเนินการนี้ไม่สามารถยกเลิกได้!");
            if (confirmClear) {
                transactions = [];
                updateLocalStorage();
                init();
                alert("ข้อมูลถูกล้างเรียบร้อยแล้ว");
            }
        }
        
        function exportToCSV() {
            if (transactions.length === 0) {
                alert("ไม่มีข้อมูลให้ดาวน์โหลด");
                return;
            }

            let csv = 'วันที่และเวลา,รายการ,รายรับ,รายจ่าย\n';
            transactions.forEach(t => {
                const dateObj = new Date(t.date);
                const localDateTime = dateObj.toLocaleTimeString('th-TH', { 
                    year: 'numeric', month: 'numeric', day: 'numeric', 
                    hour: '2-digit', minute: '2-digit', second: '2-digit' 
                });
                const income = t.amount > 0 ? formatCurrency(t.amount) : '0.00';
                const expense = t.amount < 0 ? formatCurrency(Math.abs(t.amount)) : '0.00';
                csv += `"${localDateTime}","${t.text}",${income},${expense}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const fileName = `Export_MoneyTracker_${new Date().toISOString().slice(0, 10)}.csv`;

            if (link.download !== undefined) {
                link.setAttribute('href', URL.createObjectURL(blob));
                link.setAttribute('download', fileName);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert("Browser ของคุณไม่รองรับการดาวน์โหลดอัตโนมัติ");
            }
        }

        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        function init() {
            list.innerHTML = '';
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            let lastDateString = '';

            transactions.forEach(transaction => {
                const dateObj = new Date(transaction.date);
                const dateOptions = { year: 'numeric', month: 'long', day: 'numeric' };
                const currentDateString = dateObj.toLocaleDateString('th-TH', dateOptions);
                const timeString = dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

                if (currentDateString !== lastDateString) {
                    const dateHeader = document.createElement('div');
                    dateHeader.classList.add('date-header');
                    dateHeader.innerText = currentDateString;
                    list.appendChild(dateHeader);
                    lastDateString = currentDateString;
                }

                const sign = transaction.amount < 0 ? '-' : '+';
                const item = document.createElement('li');
                item.classList.add(transaction.amount < 0 ? 'minus' : 'plus');

                item.innerHTML = `
                    <div class="item-details">
                        <span>${transaction.text}</span>
                        <span class="item-time"><i class="far fa-clock"></i> ${timeString} น.</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span>${sign}฿${formatCurrency(Math.abs(transaction.amount))}</span>
                        <button class="delete-btn" onclick="removeTransaction(${transaction.id})"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(item);
            });
            updateValues();
        }

        init();
        form.addEventListener('submit', addTransaction);

        // 🟢 ฝัง Service Worker เพื่อหลอก iOS ให้รันระบบแบบแอปพลิเคชัน Standalone ได้สมบูรณ์
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response("Offline"))));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
